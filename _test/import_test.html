<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body>
<div id="out">pending</div>
<div id="board"></div>
<script type="module">
const out = document.getElementById("out");
try {
  const mod = await import("../grid.js");
  out.textContent = "grid.js imported. exports: " + Object.keys(mod).join(",");
  const { buildGrid, cellIdFor } = mod;
  const built = buildGrid(
    [{id:"principle",label:"Principle"},{id:"operations",label:"Operations"}],
    [{id:"stack",label:"Stack"},{id:"queue",label:"Queue"}]
  );
  document.getElementById("board").appendChild(built.wrapper);
  out.textContent += " | cells=" + Object.keys(built.cells).join(",");
  window.__ok = true;
} catch (e) {
  out.textContent = "ERROR: " + e.message;
  window.__ok = false;
  window.__err = e.stack;
}
</script>
</body></html>
