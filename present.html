<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenPoll — present</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=4" />
<script src="qrcode-generator.js"></script>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <div>
      <div class="eyebrow">OpenPoll</div>
      <h1 class="display" id="title" style="margin:2px 0 0;">…</h1>
    </div>
    <div class="counter"><span id="phase">Join</span></div>
  </div>

  <div id="stage" class="stage"></div>

  <div class="nav">
    <button class="ghost" id="prev">← Back</button>
    <button id="next">Next →</button>
  </div>
</div>

<script type="module">
import { db } from "./firebase.js";
import { buildGrid } from "./grid.js";
import {
  doc, getDoc, collection, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const qid = new URLSearchParams(location.search).get("q");
const VIEWS = ["qr", "live", "result"];
const PHASE = { qr: "Join", live: "Solving", result: "Solution" };
let view = VIEWS.includes(new URLSearchParams(location.search).get("view")) ?
  new URLSearchParams(location.search).get("view") : "qr";

const stage = document.getElementById("stage");
const titleEl = document.getElementById("title");
const phaseEl = document.getElementById("phase");

let question = null;
let joins = 0;
let responses = [];

if (!qid) { stage.innerHTML = `<p class="sub">No question id in the link.</p>`; }

(async function init() {
  if (!qid) return;
  const snap = await getDoc(doc(db, "questions", qid));
  if (!snap.exists()) { stage.innerHTML = `<p class="sub">That question doesn't exist.</p>`; return; }
  question = snap.data();
  titleEl.textContent = question.title || "Question";

  onSnapshot(collection(db, "questions", qid, "joins"), (s) => { joins = s.size; render(); });
  onSnapshot(collection(db, "questions", qid, "responses"), (s) => {
    responses = s.docs.map((d) => d.data());
    render();
  });
  render();
})();

document.getElementById("next").addEventListener("click", () => step(1));
document.getElementById("prev").addEventListener("click", () => step(-1));
addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") step(1);
  if (e.key === "ArrowLeft") step(-1);
});
function step(d) {
  const i = VIEWS.indexOf(view);
  view = VIEWS[Math.min(VIEWS.length - 1, Math.max(0, i + d))];
  render();
}

let renderedView = null;
function render() {
  if (!question) return;
  // `entering` is true only when we advance to a new view, not on a live data
  // refresh — so decorative entrances (QR pop, solution sweep) play once.
  const entering = view !== renderedView;
  renderedView = view;
  phaseEl.textContent = PHASE[view];
  const matrix = (question.type || "dragdrop") === "matrix";
  if (view === "qr") return renderQR(entering);
  if (view === "live") return matrix ? renderLiveMatrix() : renderLive();
  return matrix ? renderResultMatrix(entering) : renderResult(entering);
}

function renderQR(entering) {
  const url = new URL("play.html?q=" + qid, location.href).href;
  stage.innerHTML = `
    <div class="qr-stage">
      <div id="qr"${entering ? ' class="pop"' : ""}></div>
      <div>
        <p class="eyebrow" style="color:var(--muted)">Scan to join</p>
        <p class="joinurl mono"><a href="${url}">${url.replace(/^https?:\/\//, "")}</a></p>
        <p class="sub" style="margin:8px 0 0;">No camera? Open <span class="mono">…/play.html</span> and enter code <span class="codechip mono">${qid}</span></p>
        <div class="bigjoin" style="text-align:left; margin-top:18px;">
          <div class="num display">${joins}</div>
          <div class="lbl">joined</div>
        </div>
      </div>
    </div>`;
  try {
    const qr = qrcode(0, "M");
    qr.addData(url);
    qr.make();
    const qrEl = document.getElementById("qr");
    qrEl.innerHTML = qr.createSvgTag({ cellSize: 8, margin: 16, scalable: true });
    // click the QR to blow it up fullscreen so the back row can scan it
    const svgHtml = qrEl.innerHTML;
    const shown = url.replace(/^https?:\/\//, "");
    qrEl.classList.add("clickable");
    qrEl.setAttribute("role", "button");
    qrEl.setAttribute("tabindex", "0");
    qrEl.setAttribute("aria-label", "Enlarge QR code");
    qrEl.addEventListener("click", () => openQrModal(svgHtml, shown));
    qrEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openQrModal(svgHtml, shown); }
    });
  } catch (e) {
    console.error("QR render failed:", e);
    document.getElementById("qr").textContent = "QR unavailable — share the link below.";
  }
}

/* ---------- fullscreen QR lightbox (presenter convenience) ---------- */
let qrModal = null;
function ensureQrModal() {
  if (qrModal) return qrModal;
  qrModal = document.createElement("div");
  qrModal.className = "qr-modal";
  qrModal.innerHTML =
    `<div class="qr-modal-inner">
       <div class="qr-modal-qr"></div>
       <div class="qr-modal-url mono"></div>
       <div class="qr-modal-hint">Tap anywhere to close</div>
     </div>`;
  qrModal.addEventListener("click", closeQrModal);
  document.body.appendChild(qrModal);
  return qrModal;
}
function openQrModal(svgHtml, url) {
  const m = ensureQrModal();
  m.querySelector(".qr-modal-qr").innerHTML = svgHtml;
  m.querySelector(".qr-modal-url").textContent = url;
  m.classList.add("show");
}
function closeQrModal() { if (qrModal) qrModal.classList.remove("show"); }
addEventListener("keydown", (e) => { if (e.key === "Escape") closeQrModal(); });

function renderLive() {
  const tally = cellTally(responses);
  const txt = stmtText();
  const placing = responses.filter((r) => r.answers && Object.keys(r.answers).length > 0).length;
  const sent = responses.filter((r) => r.submitted).length;
  const { wrapper, cells } = buildGrid(question.rows || [], question.cols || []);
  for (const [cellId, el] of Object.entries(cells)) {
    const counts = tally[cellId] || {};
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    if (!sorted.length) { el.innerHTML = `<span class="sub" style="margin:0">—</span>`; continue; }
    sorted.forEach(([sid, n], i) => {
      const row = document.createElement("div");
      row.className = "tally" + (i === 0 ? " top" : "");
      row.innerHTML = `<span>${escapeHtml(txt[sid] || sid)}</span><span class="n mono">${n}</span>`;
      el.appendChild(row);
    });
  }
  stage.innerHTML = "";
  stage.appendChild(banner(`${joins} joined · ${placing} placing · ${sent} sent · live`, "live"));
  stage.appendChild(wrapper);
}

function renderResult(entering) {
  const finals = responses.filter((r) => r.submitted);
  const pool = finals.length ? finals : responses;
  const tally = cellTally(pool);
  const txt = stmtText();
  const total = pool.length || 1;
  // reverse the correct map: cellId -> [statementId]
  const correctByCell = {};
  for (const [sid, cid] of Object.entries(question.correct || {})) {
    (correctByCell[cid] = correctByCell[cid] || []).push(sid);
  }
  const { wrapper, cells } = buildGrid(question.rows || [], question.cols || []);
  for (const [cellId, el] of Object.entries(cells)) {
    const correctIds = correctByCell[cellId] || [];
    const counts = tally[cellId] || {};
    // accuracy = avg over this cell's correct statements of (placed-here / total)
    let acc = 0;
    if (correctIds.length) {
      acc = correctIds.reduce((s, sid) => s + ((counts[sid] || 0) / total), 0) / correctIds.length;
    }
    const pct = Math.round(acc * 100);
    el.classList.add(pct >= 75 ? "good" : pct >= 45 ? "mid" : "bad");

    const ans = document.createElement("div");
    ans.className = "answer";
    ans.textContent = correctIds.map((s) => txt[s] || s).join(", ") || "—";
    el.appendChild(ans);

    if (pool.length) {
      const p = document.createElement("div");
      p.className = "pct mono";
      p.textContent = pct + "% correct";
      el.appendChild(p);

      // most common wrong statement landing in this cell
      const wrong = Object.entries(counts)
        .filter(([sid]) => !correctIds.includes(sid))
        .sort((a, b) => b[1] - a[1])[0];
      if (wrong) {
        const m = document.createElement("div");
        m.className = "miss";
        m.textContent = "missed → " + (txt[wrong[0]] || wrong[0]);
        el.appendChild(m);
      }
    }
  }
  stage.innerHTML = "";
  stage.appendChild(banner(`Solution · based on ${pool.length} answer${pool.length === 1 ? "" : "s"}`, "result"));
  stage.appendChild(entering ? sweepWrap(wrapper) : wrapper);
}

// Presenter-only TRANSPOSED matrix layout: phases (cols) become rows, activities
// (rows) become numbered columns. The stored cellId is unchanged
// (`${activityId}__${phaseId}`) so tallies / correctCells / the audience page
// all keep working — only the projector display is flipped.
function buildMatrixGrid(activities, phases) {
  const wrapper = document.createElement("div");
  wrapper.className = "grid matgrid";
  const cells = {};
  wrapper.style.gridTemplateColumns =
    "minmax(120px,auto) " + `repeat(${activities.length}, minmax(54px,1fr))`;

  // header row: empty corner + activity numbers (1..n)
  wrapper.appendChild(Object.assign(document.createElement("div"), { className: "ghead corner" }));
  activities.forEach((a, i) => {
    const h = document.createElement("div");
    h.className = "ghead col matcolhead";
    h.textContent = String(i + 1);
    wrapper.appendChild(h);
  });

  // one row per phase
  phases.forEach((p) => {
    const rh = document.createElement("div");
    rh.className = "ghead row";
    rh.textContent = p.label;
    wrapper.appendChild(rh);
    activities.forEach((a) => {
      const id = `${a.id}__${p.id}`;
      const cell = document.createElement("div");
      cell.className = "cell matcell";
      cell.dataset.cell = id;
      wrapper.appendChild(cell);
      cells[id] = cell;
    });
  });
  return { wrapper, cells };
}

// numbered key for the transposed activity columns
function matrixLegend(activities) {
  const d = document.createElement("div");
  d.className = "matlegend";
  activities.forEach((a, i) => {
    const item = document.createElement("div");
    item.className = "matlegend-item";
    item.innerHTML = `<span class="matlegend-num mono">${i + 1}</span><span>${escapeHtml(a.label)}</span>`;
    d.appendChild(item);
  });
  return d;
}

function renderLiveMatrix() {
  const tally = cellChecks(responses);
  const placing = responses.filter((r) => r.checks && Object.keys(r.checks).length > 0).length;
  const sent = responses.filter((r) => r.submitted).length;
  const max = Math.max(1, ...Object.values(tally));
  const { wrapper, cells } = buildMatrixGrid(question.rows || [], question.cols || []);
  for (const [cellId, el] of Object.entries(cells)) {
    const n = tally[cellId] || 0;
    if (!n) { el.innerHTML = `<span class="sub" style="margin:0">—</span>`; continue; }
    el.style.background = `rgba(216,99,46,${(0.12 + 0.6 * (n / max)).toFixed(2)})`;
    const d = document.createElement("div");
    d.className = "matnum mono";
    d.textContent = n;
    el.appendChild(d);
  }
  stage.innerHTML = "";
  stage.appendChild(banner(`${joins} joined · ${placing} answering · ${sent} sent · live`, "live"));
  stage.appendChild(scrollWrap(wrapper));
  stage.appendChild(matrixLegend(question.rows || []));
}

function renderResultMatrix(entering) {
  const finals = responses.filter((r) => r.submitted);
  const pool = finals.length ? finals : responses;
  const total = pool.length || 1;
  const tally = cellChecks(pool);
  const correct = new Set(question.correctCells || []);
  const { wrapper, cells } = buildMatrixGrid(question.rows || [], question.cols || []);
  for (const [cellId, el] of Object.entries(cells)) {
    const n = tally[cellId] || 0;
    const pct = Math.round((n / total) * 100);
    const isCorrect = correct.has(cellId);
    if (isCorrect) {
      el.classList.add(pct >= 70 ? "good" : pct >= 40 ? "mid" : "bad");
      const a = document.createElement("div");
      a.className = "answer"; a.textContent = "✓";
      el.appendChild(a);
      if (pool.length) {
        const p = document.createElement("div");
        p.className = "pct mono"; p.textContent = pct + "% ticked";
        el.appendChild(p);
      }
    } else if (pool.length && pct >= 30) {
      el.classList.add("bad");
      const p = document.createElement("div");
      p.className = "pct mono"; p.textContent = pct + "% ticked";
      el.appendChild(p);
      const m = document.createElement("div");
      m.className = "miss"; m.textContent = "not expected";
      el.appendChild(m);
    } else if (n) {
      const s = document.createElement("div");
      s.className = "matnum mono faint"; s.textContent = n;
      el.appendChild(s);
    }
  }
  stage.innerHTML = "";
  stage.appendChild(banner(`Solution · ✓ = expected · based on ${pool.length} answer${pool.length === 1 ? "" : "s"}`, "result"));
  // matrix grid scrolls horizontally, so tint cells in place rather than clipping a sweep bar
  stage.appendChild(scrollWrap(wrapper, entering));
  stage.appendChild(matrixLegend(question.rows || []));
}

function scrollWrap(el, reveal) {
  const d = document.createElement("div");
  d.className = "gridscroll" + (reveal ? " revealing" : "");
  d.appendChild(el);
  return d;
}

// cellId -> count of devices that ticked it
function cellChecks(list) {
  const t = {};
  for (const r of list) {
    const ch = r.checks || {};
    for (const cid of Object.keys(ch)) t[cid] = (t[cid] || 0) + 1;
  }
  return t;
}

function banner(text, kind) {
  const d = document.createElement("div");
  d.className = "bar statusbar";
  const span = document.createElement("span");
  span.className = "statusbanner " + (kind === "live" ? "live" : "result");
  if (kind === "live") {
    const dot = document.createElement("span");
    dot.className = "dot";
    span.appendChild(dot);
  }
  const t = document.createElement("span");
  t.className = "big mono";
  t.textContent = text;
  span.appendChild(t);
  d.appendChild(span);
  return d;
}

// Wrap a result grid so the solution sweeps left→right, tinting cells in its wake.
function sweepWrap(el) {
  const w = document.createElement("div");
  w.className = "gridwrap revealing";
  const s = document.createElement("div");
  s.className = "sweep";
  w.appendChild(s);
  w.appendChild(el);
  return w;
}

// cellId -> { statementId: count }
function cellTally(list) {
  const t = {};
  for (const r of list) {
    const a = r.answers || {};
    for (const [sid, cid] of Object.entries(a)) {
      (t[cid] = t[cid] || {});
      t[cid][sid] = (t[cid][sid] || 0) + 1;
    }
  }
  return t;
}
function stmtText() {
  const m = {};
  (question.statements || []).forEach((s) => (m[s.id] = s.text));
  return m;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
</script>
</body>
</html>
