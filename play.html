<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>OpenPoll — answer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">OpenPoll</div>
  <h1 class="display" id="title">…</h1>
  <p class="sub" id="hint"></p>

  <div id="content"></div>

  <div class="nav" style="justify-content:flex-start; margin-top:24px;">
    <button id="send">Send answer</button>
    <span id="state" class="sub" style="margin:0; align-self:center;"></span>
  </div>
</div>

<script type="module">
import { db } from "./firebase.js";
import { buildZones, cellIdFor } from "./grid.js";
import {
  doc, getDoc, setDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const qid = new URLSearchParams(location.search).get("q");
const titleEl = document.getElementById("title");
const hintEl = document.getElementById("hint");
const content = document.getElementById("content");
const sendBtn = document.getElementById("send");
const stateEl = document.getElementById("state");

function newId() {
  return (self.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : "c" + Math.random().toString(36).slice(2) + Date.now().toString(36);
}
const clientId = (() => {
  const KEY = "openpoll_device";
  try {
    let id = localStorage.getItem(KEY);
    if (!id) { id = newId(); localStorage.setItem(KEY, id); }
    return id;
  } catch (e) { return newId(); }
})();

if (!qid) fail("No question id in the link.");

let question = null, type = "dragdrop", cells = {};
let locked = false, syncTimer = null;

(async function init() {
  if (!qid) return;
  let snap;
  try { snap = await getDoc(doc(db, "questions", qid)); }
  catch (e) { return fail("Could not load: " + e.message); }
  if (!snap.exists()) return fail("That question doesn't exist.");

  question = snap.data();
  type = question.type || "dragdrop";
  titleEl.textContent = question.title || "Question";

  if (type === "matrix") renderMatrix();
  else renderDragDrop();

  // count this device as joined once (keyed by stable id, refresh-safe)
  setDoc(doc(db, "questions", qid, "joins", clientId), { at: serverTimestamp() }).catch(() => {});
})();

/* ---------- drag-and-drop ---------- */
function renderDragDrop() {
  hintEl.textContent = "Drag each statement into the right place. A place can hold more than one. Tap Send answer when done.";
  const bank = document.createElement("div");
  bank.className = "bank";
  shuffle(question.statements.slice()).forEach((s) => bank.appendChild(chip(s)));
  const built = buildZones(question.rows || [], question.cols || []);
  cells = built.cells;
  content.appendChild(bank);
  const spacer = document.createElement("div"); spacer.style.height = "16px"; content.appendChild(spacer);
  content.appendChild(built.wrapper);

  makeSortable(bank);
  Object.values(cells).forEach(makeSortable);
}
function chip(s) {
  const d = document.createElement("div");
  d.className = "chip"; d.dataset.id = s.id; d.textContent = s.text;
  return d;
}
function makeSortable(el) {
  Sortable.create(el, {
    group: "pool", animation: 150, draggable: ".chip",
    onAdd: onChange, onRemove: onChange, onUpdate: onChange, onEnd: onChange,
    onStart: () => el.classList.remove("over")
  });
}
function onChange() {
  document.querySelectorAll(".cell.over").forEach((c) => c.classList.remove("over"));
  syncLive();
}
function dragAnswers() {
  const answers = {};
  for (const [cellId, el] of Object.entries(cells)) {
    el.querySelectorAll(".chip").forEach((c) => { answers[c.dataset.id] = cellId; });
  }
  return answers;
}

/* ---------- matrix (tap to toggle) ---------- */
function renderMatrix() {
  hintEl.textContent = "Tap every phase that applies to each activity. An activity can belong to more than one. Tap Send answer when done.";
  const hasRows = (question.rows || []).length > 0;
  const hasCols = (question.cols || []).length > 0;
  (question.rows || []).forEach((r) => {
    const card = document.createElement("div");
    card.className = "acard";
    const t = document.createElement("div");
    t.className = "atext"; t.textContent = r.label;
    const toggles = document.createElement("div");
    toggles.className = "toggles";
    (question.cols || []).forEach((c) => {
      const id = cellIdFor(r.id, c.id, hasRows, hasCols);
      const b = document.createElement("button");
      b.type = "button"; b.className = "toggle"; b.dataset.cell = id; b.textContent = c.label;
      b.addEventListener("click", () => {
        if (locked) return;
        b.classList.toggle("on");
        syncLive();
      });
      toggles.appendChild(b);
    });
    card.appendChild(t); card.appendChild(toggles);
    content.appendChild(card);
  });
}
function matrixChecks() {
  const checks = {};
  document.querySelectorAll(".toggle.on").forEach((b) => { checks[b.dataset.cell] = true; });
  return checks;
}

/* ---------- shared: live sync + submit ---------- */
function payload(submitted) {
  return type === "matrix"
    ? { checks: matrixChecks(), submitted, at: serverTimestamp() }
    : { answers: dragAnswers(), submitted, at: serverTimestamp() };
}
function hasAnything() {
  return type === "matrix"
    ? Object.keys(matrixChecks()).length > 0
    : Object.keys(dragAnswers()).length > 0;
}
function syncLive() {
  if (locked) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => {
    setDoc(doc(db, "questions", qid, "responses", clientId), payload(false)).catch(() => {});
  }, 250);
}
sendBtn.addEventListener("click", async () => {
  if (!hasAnything()) { stateEl.textContent = "Make at least one choice first."; return; }
  clearTimeout(syncTimer);
  sendBtn.disabled = true;
  stateEl.textContent = "Sending…";
  try {
    await setDoc(doc(db, "questions", qid, "responses", clientId), payload(true));
    lock();
  } catch (e) {
    sendBtn.disabled = false;
    stateEl.innerHTML = `<span class="flash">Failed: ${e.message}</span>`;
  }
});
function lock() {
  locked = true;
  document.querySelectorAll(".chip").forEach((c) => (c.style.pointerEvents = "none"));
  document.querySelectorAll(".toggle").forEach((b) => (b.disabled = true));
  stateEl.textContent = "Answer sent — watch the screen.";
}

function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function fail(m) {
  document.querySelector(".wrap").innerHTML =
    `<div class="eyebrow">OpenPoll</div><h1 class="display">Hmm.</h1><p class="sub">${m}</p>`;
}
</script>
</body>
</html>
